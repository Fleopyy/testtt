<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnteraktif Test Sayfası</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #e8eaed;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            min-height: auto;
            overflow: visible;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #1a237e;
            padding-bottom: 20px;
        }

        h1 {
            color: #1a237e;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .progress-info {
            color: #455a64;
            font-size: 16px;
            font-weight: 500;
        }

        .question-container {
            margin-bottom: 30px;
            animation: slideIn 0.4s ease-in-out;
            min-height: auto;
            overflow: visible;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            font-size: 18px;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 16px;
            color: #1a237e;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-left: 4px solid #1a237e;
            border-radius: 5px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option {
            padding: 12px 15px;
            border: 2px solid #455a64;
            border-radius: 8px;
            cursor: pointer;
            background: #f5f5f5;
            color: #1a237e;
            font-weight: 500;
            text-align: left;
            transition: all 0.3s ease;
            user-select: none;
            word-wrap: break-word;
            white-space: normal;
            line-height: 1.5;
        }

        .option:hover:not(.selected-correct):not(.selected-incorrect):not(.correct-answer) {
            background: #e3f2fd;
            border-color: #1a237e;
            transform: translateY(-2px);
        }

        .option.selected-incorrect {
            background: #ef5350;
            color: white;
            border-color: #ef5350;
            animation: shake 0.5s;
        }

        .option.selected-correct {
            background: #66bb6a;
            color: white;
            border-color: #66bb6a;
            animation: pulse 0.5s;
        }

        .option.correct-answer {
            background: #66bb6a;
            color: white;
            border-color: #66bb6a;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .answer-feedback {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            display: none;
            min-height: 50px;
            align-items: center;
            justify-content: center;
        }

        .answer-feedback.correct {
            background: #c8e6c9;
            color: #2e7d32;
            display: flex;
            border-left: 4px solid #66bb6a;
        }

        .answer-feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
            display: flex;
            border-left: 4px solid #ef5350;
        }

        .correct-info {
            margin-top: 10px;
            padding: 10px;
            font-size: 14px;
            background: #e3f2fd;
            border-left: 4px solid #1a237e;
            border-radius: 5px;
            color: #1a237e;
        }

        .navigation {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-prev {
            background: #455a64;
            color: white;
        }

        .btn-prev:hover {
            background: #37474f;
            transform: translateX(-3px);
        }

        .btn-prev:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            transform: none;
        }

        .btn-next {
            background: #1a237e;
            color: white;
        }

        .btn-next:hover {
            background: #0d1b4a;
            transform: translateX(3px);
        }

        .btn-next:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            transform: none;
        }

        .question-list {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .question-indicator {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            border: 2px solid #455a64;
            background: white;
            color: #1a237e;
        }

        .question-indicator:hover {
            transform: scale(1.1);
        }

        .question-indicator.answered-correct {
            background: #66bb6a;
            color: white;
            border-color: #66bb6a;
        }

        .question-indicator.answered-incorrect {
            background: #ef5350;
            color: white;
            border-color: #ef5350;
        }

        .question-indicator.current {
            background: #1a237e;
            color: white;
            border-color: #1a237e;
            box-shadow: 0 0 10px rgba(26, 35, 126, 0.5);
        }

        .results-summary {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .results-summary h2 {
            color: #1a237e;
            margin-bottom: 15px;
        }

        .score-display {
            font-size: 24px;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 10px;
        }

        .percentage {
            font-size: 18px;
            color: #455a64;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .options {
                grid-template-columns: 1fr;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        .code-block {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            overflow-x: auto;
            margin-bottom: 20px;
            line-height: 1.6;
            text-align: left;
        }

        .blank-input {
            background: #1e1e1e;
            color: #4CAF50;
            border: 1px solid #888;
            border-radius: 4px;
            padding: 2px 8px;
            margin: 0 4px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            outline: none;
            width: auto;
            min-width: 140px;
            transition: all 0.3s;
        }

        .blank-input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }

        .blank-input.correct {
            border-color: #66bb6a;
            background: rgba(102, 187, 106, 0.2);
            color: #66bb6a;
        }

        .blank-input.incorrect {
            border-color: #ef5350;
            background: rgba(239, 83, 80, 0.2);
            color: #ef5350;
        }

        .submit-btn {
            padding: 12px 30px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

        const answerMap = {
            "A": 0, "B": 1, "C": 2, "D": 3, "E": 4
        };

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);

        function init() {
            document.getElementById('totalQuestions').textContent = questions.length;
            renderQuestionList();
            renderQuestion();
        }

        function renderQuestionList() {
            const list = document.getElementById('questionList');
            list.innerHTML = '';

            questions.forEach((q, index) => {
                const btn = document.createElement('div');
                btn.className = 'question-indicator';
                btn.textContent = index + 1;
                btn.id = `q-${index}`;

                if (index === currentQuestion) {
                    btn.classList.add('current');
                } else if (answers[index] !== null) {
                    let isCorrect = false;
                    if (q.type === 'fill_in_the_blank') {
                        isCorrect = answers[index].isCorrect;
                    } else {
                        isCorrect = (answers[index] === q.correct);
                    }

                    if (isCorrect) {
                        btn.classList.add('answered-correct');
                    } else {
                        btn.classList.add('answered-incorrect');
                    }
                }

                btn.onclick = () => goToQuestion(index);
                list.appendChild(btn);
            });
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `Soru ${currentQuestion + 1}`;
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;

            const optionsDiv = document.getElementById('options');
            const codeContainer = document.getElementById('codeContainer');
            const submitBtnContainer = document.getElementById('submitBtnContainer');
            const correctStaticDiv = document.getElementById('correctAnswerStatic');
            const feedback = document.getElementById('feedback');

            optionsDiv.innerHTML = '';
            codeContainer.innerHTML = '';
            feedback.style.display = 'none';
            correctStaticDiv.style.display = 'none';
            correctStaticDiv.textContent = '';

            if (q.type === 'fill_in_the_blank') {
                optionsDiv.style.display = 'none';
                codeContainer.style.display = 'block';
                submitBtnContainer.style.display = 'block';

                // Güvenli kod gösterimi için < ve > gibi karakterleri escape et  
                let escaper = document.createElement('div');
                escaper.textContent = q.code;
                let codeHtml = escaper.innerHTML;

                Object.keys(q.answers).forEach(key => {
                    let inputHtml = `<input type="text" id="blank-${key}" data-key="${key}" class="blank-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />`;
                    // codeHtml içerisinde &lt; vs olsa bile [[1]] yapısı bozulmaz
                    codeHtml = codeHtml.replace(`[[${key}]]`, inputHtml);
                });

                codeContainer.innerHTML = `<pre class="code-block"><code>${codeHtml}</code></pre>`;

                if (answers[currentQuestion] !== null) {
                    const ansData = answers[currentQuestion];
                    Object.keys(q.answers).forEach(key => {
                        const inputEl = document.getElementById(`blank-${key}`);
                        inputEl.value = ansData.inputs[key] || '';
                        inputEl.disabled = true;

                        const isFieldCorrect = (ansData.inputs[key] || '').trim().toLowerCase() === q.answers[key].trim().toLowerCase();
                        if (isFieldCorrect) {
                            inputEl.classList.add('correct');
                        } else {
                            inputEl.classList.add('incorrect');
                        }
                    });

                    submitBtnContainer.style.display = 'none';
                    correctStaticDiv.style.display = 'none';

                    feedback.classList.remove('correct', 'incorrect');
                    if (ansData.isCorrect) {
                        feedback.textContent = '✓ Doğru! Tebrikler!';
                        feedback.classList.add('correct');
                    } else {
                        feedback.textContent = '✗ Hatalı doldurulan boşluklar var.';
                        feedback.classList.add('incorrect');
                    }
                    feedback.style.display = 'flex';
                } else {
                    document.getElementById('submitBlankBtn').disabled = false;
                }
            } else {
                optionsDiv.style.display = 'grid';
                codeContainer.style.display = 'none';
                submitBtnContainer.style.display = 'none';
                correctStaticDiv.style.display = 'none';

                if (q.options) {
                    q.options.forEach((option, index) => {
                        const btn = document.createElement('div');
                        btn.className = 'option';
                        btn.textContent = option;
                        btn.onclick = () => selectAnswer(index);
                        optionsDiv.appendChild(btn);
                    });
                }

                if (answers[currentQuestion] !== null) {
                    const selectedIndex = answerMap[answers[currentQuestion]];
                    const correctIndex = answerMap[q.correct];
                    const allOptions = document.querySelectorAll('.option');

                    if (answers[currentQuestion] === q.correct) {
                        allOptions[selectedIndex].classList.add('selected-correct');
                    } else {
                        allOptions[selectedIndex].classList.add('selected-incorrect');
                        if (allOptions[correctIndex]) {
                            allOptions[correctIndex].classList.add('correct-answer');
                        }
                    }
                }

                if (answers[currentQuestion] !== null) {
                    feedback.classList.remove('correct', 'incorrect');
                    if (answers[currentQuestion] === q.correct) {
                        feedback.textContent = '✓ Doğru! Tebrikler!';
                        feedback.classList.add('correct');
                    } else {
                        const correctIndex = answerMap[q.correct];
                        const correctOptionText = q.options[correctIndex];
                        feedback.textContent = `✗ Yanlış! Doğru cevap: ${q.correct}) ${correctOptionText}`;
                        feedback.classList.add('incorrect');
                    }
                    feedback.style.display = 'flex';
                } else {
                    feedback.classList.remove('correct', 'incorrect');
                    feedback.innerHTML = '';
                    feedback.style.display = 'none';
                }

                // Doğru cevap static kısmı kaldırıldı
            }

            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = currentQuestion === questions.length - 1;

            renderQuestionList();
        }

        function checkBlankAnswers() {
            const q = questions[currentQuestion];
            if (q.type !== 'fill_in_the_blank' || answers[currentQuestion] !== null) return;

            let allCorrect = true;
            const userInputs = {};

            Object.keys(q.answers).forEach(key => {
                const inputEl = document.getElementById(`blank-${key}`);
                const val = inputEl.value;
                userInputs[key] = val;
                if (val.trim().toLowerCase() !== q.answers[key].trim().toLowerCase()) {
                    allCorrect = false;
                }
            });

            answers[currentQuestion] = {
                isCorrect: allCorrect,
                inputs: userInputs
            };

            document.getElementById('submitBlankBtn').disabled = true;
            renderQuestion();

            if (allCorrect) {
                if (currentQuestion < questions.length - 1) {
                    setTimeout(() => {
                        currentQuestion++;
                        renderQuestion();
                    }, 2000);
                }
            }
        }

        // Cevap seç
        function selectAnswer(index) {
            if (answers[currentQuestion] === null) {
                const answerLetter = Object.keys(answerMap)[index];
                answers[currentQuestion] = answerLetter;

                // Render et, sonra disable et
                renderQuestion();

                // Tüm şıkları disable et
                setTimeout(() => {
                    const allOptions = document.querySelectorAll('.option');
                    allOptions.forEach(btn => {
                        btn.style.pointerEvents = 'none';
                        btn.style.cursor = 'default';
                    });
                }, 100);

                // Doğru cevap ise 2 saniye sonra sonraki soruya otomatik geç
                if (answerLetter === questions[currentQuestion].correct) {
                    if (currentQuestion < questions.length - 1) {
                        setTimeout(() => {
                            currentQuestion++;
                            renderQuestion();
                        }, 2000);
                    }
                }
            }
        }

        // Önceki soruya git
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // Sonraki soruya git
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        }

        // Belirli bir soruya git
        function goToQuestion(index) {
            currentQuestion = index;
            renderQuestion();
        }

        // Sayfayı başlat
        init();
    </script>
