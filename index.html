<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgisayar Ağları ve Protokolleri - 100 Soruluk Büyük Sınav</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #1e293b;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            border-bottom: 3px solid #38bdf8;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        header h1 {
            color: #0f172a;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .question-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #0f172a;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #cbd5e1;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .option-label:hover {
            background: #f0f9ff;
            border-color: #38bdf8;
        }

        .option-label input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        /* Doğru/Yanlış Renklendirmeleri */
        .correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #14532d !important;
            font-weight: 600;
        }

        .wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }

        #result-area {
            display: none;
            text-align: center;
            background: #ecfdf5;
            border: 2px solid #10b981;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        #result-title {
            color: #065f46;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .action-btn {
            display: block;
            width: 100%;
            background: #0284c7;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .action-btn:hover {
            background: #0369a1;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Ağ Teknolojileri ve Yönetimi Büyük Sınavı</h1>
            <p>Müfredatın tüm modüllerini içeren 100 soruluk interaktif test</p>
        </header>

        <div id="result-area">
            <h2 id="result-title">Sınav Tamamlandı!</h2>
            <p id="score-text" style="font-size: 1.3rem; color: #0f172a; font-weight: bold;"></p>
        </div>

        <form id="quiz-form">
            <div id="questions-container"></div>
            <button type="button" class="action-btn" onclick="checkAnswers()">Sınavı Bitir ve Sonuçları Gör</button>
        </form>
    </div>

    <script>
        const questions = [
            // 1-10: Taşıma Katmanı Giriş ve TCP
            { q: "Ağa bağlı diğer bilgisayarlara bilgi veya hizmet sağlayan konak bilgisayara ne ad verilir?", a: ["Sunucu (Server)", "İstemci (Client)", "Hub", "Tekrarlayıcı"], c: 0 },
            { q: "Sunucunun sunduğu bilgi veya hizmetleri talep eden bilgisayara ne ad verilir?", a: ["Anahtar", "Yönlendirici", "İstemci (Client)", "Ajan"], c: 2 },
            { q: "Aşağıdakilerden hangisi bağlantılı (connection-oriented) çalışan bir taşıma katmanı protokolüdür?", a: ["UDP", "IP", "ICMP", "TCP"], c: 3 },
            { q: "TCP protokolünde verinin alıcı tarafta doğru sıraya konulabilmesi için her bir parçaya ne verilir?", a: ["Port numarası", "Sıra (Sequence) numarası", "Onay (ACK) numarası", "MAC adresi"], c: 1 },
            { q: "TCP segment yapısının standart başlık (header) boyutu kaç byte'tır?", a: ["8 Byte", "20 Byte", "32 Byte", "64 Byte"], c: 1 },
            { q: "Göndericinin verisinin bittiğini ve bağlantının kapatılmak istendiğini belirten TCP bayrağı hangisidir?", a: ["SYN", "ACK", "FIN", "RST"], c: 2 },
            { q: "Bağlantının kurulması amacıyla sıra numaralarının eş zamanlanması için kullanılan TCP bayrağı hangisidir?", a: ["SYN", "RST", "PSH", "URG"], c: 0 },
            { q: "Gelen verinin tamponda bekletilmeden hemen üst katmana iletilmesini sağlayan TCP bayrağı hangisidir?", a: ["ACK", "PSH", "SYN", "FIN"], c: 1 },
            { q: "TCP protokolünde verinin karşı tarafa ulaştığından emin olmak için hangi kontrol paketi beklenir?", a: ["SYN", "FIN", "RST", "ACK (Onay)"], c: 3 },
            { q: "Oturum açılması sırasında tarafların parametreleri belirlemek için kullandığı yönteme ne ad verilir?", a: ["Kapsülleme", "El sıkışma (Handshaking)", "Yönlendirme", "Hizmet Engelleme"], c: 1 },

            // 11-20: UDP ve Portlar
            { q: "Aşağıdakilerden hangisi bağlantısız (connectionless) çalışan, güvenilir olmayan taşıma katmanı protokolüdür?", a: ["TCP", "UDP", "HTTP", "FTP"], c: 1 },
            { q: "UDP segment başlığı (header) kaç byte boyutundadır?", a: ["8 Byte", "20 Byte", "16 Byte", "32 Byte"], c: 0 },
            { q: "Aşağıdaki alanlardan hangisi UDP başlık yapısında yer almaz?", a: ["Kaynak Port", "Hedef Port", "Sıra Numarası (Sequence)", "Hata Kontrolü (Checksum)"], c: 2 },
            { q: "Gerçek zamanlı ses ve görüntü aktarımlarında (VoIP vb.) hangi protokol tercih edilir ve neden?", a: ["TCP - Güvenli olduğu için", "UDP - Hızlı olduğu için", "HTTP - Yaygın olduğu için", "ICMP - Test edebildiği için"], c: 1 },
            { q: "Bir IP adresi ile bir port numarasının birleşmesiyle oluşan yapıya ne ad verilir?", a: ["Soket (Socket)", "Çerçeve (Frame)", "Paket", "Alt Ağ Maskesi"], c: 0 },
            { q: "Ağ üzerinde toplam kaç adet mantıksal port numarası bulunur?", a: ["1024", "32768", "65535", "8080"], c: 2 },
            { q: "IANA standartlarına göre 'İyi Bilinen (Well-known) Portlar' hangi aralıktadır?", a: ["0 - 1023", "1024 - 49151", "49152 - 65535"], c: 0 },
            { q: "Windows işletim sistemlerinde standart port ve servis eşleşmelerini tutan dosya hangi dizindedir?", a: ["C:\\Windows\\System32\\drivers\\etc\\services", "C:\\Windows\\System32\\drivers\\etc\\hosts", "C:\\Windows\\System32\\config", "C:\\Windows\\System32\\drivers\\etc\\lmhosts"], c: 0 },
            { q: "Dosya Transfer Protokolü (FTP) veri iletimi için varsayılan olarak hangi portu kullanır?", a: ["Port 21", "Port 22", "Port 20", "Port 23"], c: 2 },
            { q: "Güvenli ve kriptolu uzak sunucu yönetimi sağlayan SSH servisinin portu hangisidir?", a: ["Port 23", "Port 22", "Port 25", "Port 53"], c: 1 },

            // 21-30: Portlar ve Uygulama Katmanı
            { q: "Şifresiz ve güvensiz uzak komut satırı bağlantısı sunan Telnet protokolünün portu hangisidir?", a: ["Port 21", "Port 22", "Port 23", "Port 25"], c: 2 },
            { q: "E-posta göndermek ve sunucular arası posta iletimi sağlamak için kullanılan protokol ve portu hangisidir?", a: ["POP3 - Port 110", "SMTP - Port 25", "IMAP - Port 143", "HTTP - Port 80"], c: 1 },
            { q: "Kullanıcı dostu internet alan adlarını IP adreslerine dönüştüren sistem (DNS) hangi portu kullanır?", a: ["Port 53", "Port 80", "Port 443", "Port 67"], c: 0 },
            { q: "E-postaları sunucudan çekip yerel bilgisayara indiren ve varsayılan olarak sunucudan silen protokol hangisidir?", a: ["IMAP4", "SMTP", "POP3", "SNMP"], c: 2 },
            { q: "E-postaları kullanıcı silmediği sürece sunucuda tutan ve çoklu cihaz senkronizasyonu sağlayan protokol hangisidir?", a: ["POP3", "IMAP4", "SMTP", "TFTP"], c: 1 },
            { q: "Şifrelenmiş, SSL/TLS güvenlik altyapısına sahip web trafiği (HTTPS) hangi portu kullanır?", a: ["Port 80", "Port 8080", "Port 443", "Port 465"], c: 2 },
            { q: "DHCP sunucusunun istemcilere otomatik IP dağıtmak için kullandığı servis portu hangisidir?", a: ["Port 67", "Port 68", "Port 53", "Port 161"], c: 0 },
            { q: "Ağ cihazlarının izlenmesi ve yönetimini sağlayan SNMP servisinin dinleme portu hangisidir?", a: ["Port 162", "Port 161", "Port 69", "Port 110"], c: 1 },
            { q: "Aşağıdakilerden hangisi şifreli e-posta alma (POP3S) protokolünün portudur?", a: ["Port 465", "Port 993", "Port 995", "Port 143"], c: 2 },
            { q: "Aşağıdakilerden hangisi şifreli IMAPS protokolünün standart portudur?", a: ["Port 993", "Port 995", "Port 465", "Port 110"], c: 0 },

            // 31-40: Uygulama Katmanı Servis Derinliği
            { q: "Bilgisayarın bir web sitesine gitmeden önce DNS sunucusundan önce kontrol ettiği yerel dosya hangisidir?", a: ["services", "networks", "hosts", "protocol"], c: 2 },
            { q: "Yerel 'hosts' dosyası Windows işletim sisteminde hangi tam dizinde yer alır?", a: ["C:\\Windows\\System32\\", "C:\\Windows\\System32\\drivers\\etc\\", "C:\\Windows\\System32\\config\\", "C:\\Windows\\"], c: 1 },
            { q: "Aktif FTP modunda, veri bağlantısını kurmak için PORT komutunu gönderen ve kendi üzerinde port açan taraf hangisidir?", a: ["Sunucu (Server)", "Yönlendirici (Router)", "İstemci (Client)", "Güvenlik Duvarı"], c: 2 },
            { q: "Güvenlik duvarı ve NAT cihazlarının engellemelerini aşmak için istemcinin PASV komutu gönderdiği FTP modu hangisidir?", a: ["Aktif FTP", "Pasif FTP", "Güvenli FTP", "Trivial FTP"], c: 1 },
            { q: "UDP 69 portunu kullanan, kimlik doğrulaması olmayan ve router cihazlarının boot edilmesinde kullanılan basit dosya transfer protokolü hangisidir?", a: ["FTP", "SFTP", "TFTP", "FTPS"], c: 2 },
            { q: "DHCP protokolünün otomatik IP atama sürecindeki ilk adımı (istemcinin ağa yayın yapması) hangisidir?", a: ["DHCP Offer", "DHCP Request", "DHCP Discover", "DHCP Ack"], c: 2 },
            { q: "DHCP sunucusunun istemciye uygun bir IP ve kiralama süresi önerdiği adım hangisidir?", a: ["DHCP Discover", "DHCP Offer", "DHCP Request", "DHCP Ack"], c: 1 },
            { q: "İstemcinin, DHCP sunucusundan gelen IP teklifini kabul ettiğini ağa duyurduğu adım hangisidir?", a: ["DHCP Request", "DHCP Offer", "DHCP Ack", "DHCP Discover"], c: 0 },
            { q: "DHCP sürecinde sunucunun istemciye tüm ağ parametrelerini kesin olarak atayıp onayladığı son adım hangisidir?", a: ["DHCP Discover", "DHCP Offer", "DHCP Request", "DHCP Ack"], c: 3 },
            { q: "SNMP sisteminde cihazların durum, performans ve yapılandırma bilgilerini tuttukları hiyerarşik veri tabanına ne denir?", a: ["NMS", "Agent", "MIB", "Trap"], c: 2 },

            // 41-50: SNMP ve OSI Modeli
            { q: "SNMP mimarisinde, cihazda olağanüstü bir durum oluştuğunda Agent'ın NMS'e gönderdiği anlık uyarı mesajına ne ad verilir?", a: ["GetRequest", "SetRequest", "Trap", "Response"], c: 2 },
            { q: "Uluslararası Standartlar Organizasyonu (ISO) tarafından geliştirilen 7 katmanlı ağ modeli hangisidir?", a: ["TCP/IP", "OSI Modeli", "DoD Modeli", "Ethernet Modeli"], c: 1 },
            { q: "OSI modelinde kullanıcıya en yakın olan, tarayıcı ve e-posta gibi programların ağ servisleriyle buluştuğu katman hangisidir?", a: ["Sunum Katmanı", "Uygulama Katmanı", "Oturum Katmanı", "Taşıma Katmanı"], c: 1 },
            { q: "Verinin formatının belirlendiği, şifreleme/şifre çözme ve sıkıştırma işlemlerinin yapıldığı OSI katmanı hangisidir?", a: ["Uygulama Katmanı", "Oturum Katmanı", "Sunum Katmanı", "Ağ Katmanı"], c: 2 },
            { q: "İki bilgisayar arasındaki diyalog sürecini başlatan, yöneten ve sonlandıran OSI katmanı hangisidir?", a: ["Oturum Katmanı", "Taşıma Katmanı", "Veri Bağlantısı Katmanı", "Sunum Katmanı"], c: 0 },
            { q: "Verinin uçtan uca güvenli, hatasız iletimini üstlenen, veriyi segmentlere bölen OSI katmanı hangisidir?", a: ["Ağ Katmanı", "Fiziksel Katman", "Taşıma Katmanı", "Oturum Katmanı"], c: 2 },
            { q: "Farklı ağlar arasında yönlendirme (routing) yapan ve kaynak/hedef IP adreslerinin eklendiği OSI katmanı hangisidir?", a: ["Veri Bağlantısı Katmanı", "Ağ Katmanı", "Taşıma Katmanı", "Fiziksel Katman"], c: 1 },
            { q: "Veriye kaynak ve hedef MAC adreslerinin eklendiği, Switch'lerin görev yaptığı OSI katmanı hangisidir?", a: ["Fiziksel Katman", "Ağ Katmanı", "Veri Bağlantısı Katmanı", "Oturum Katmanı"], c: 2 },
            { q: "Verinin elektrik, ışık veya radyo dalgaları halinde 'Bitler' olarak kablodan iletildiği OSI katmanı hangisidir?", a: ["Ağ Katmanı", "Veri Bağlantısı Katmanı", "Fiziksel Katman", "Sunum Katmanı"], c: 2 },
            { q: "Hub (Dağıtıcı) ve Repeater (Tekrarlayıcı) cihazları OSI modelinin hangi katmanında çalışır?", a: ["Veri Bağlantısı Katmanı", "Ağ Katmanı", "Taşıma Katmanı", "Fiziksel Katman"], c: 3 },

            // 51-60: TCP/IP Modeli ve Paketleme (Encapsulation)
            { q: "TCP/IP modeli kaç katmandan oluşur?", a: ["7", "5", "4", "3"], c: 2 },
            { q: "OSI modelindeki Uygulama, Sunum ve Oturum katmanları TCP/IP modelinde hangi katmana denk gelir?", a: ["Taşıma Katmanı", "Uygulama Katmanı", "İnternet Katmanı", "Ağ Arayüzü Katmanı"], c: 1 },
            { q: "OSI modelindeki Ağ katmanı, TCP/IP modelinde hangi katmana karşılık gelir?", a: ["Taşıma Katmanı", "İnternet Katmanı", "Ağ Arayüzü Katmanı", "Uygulama Katmanı"], c: 1 },
            { q: "Ağ katmanında (Network Layer) başlık eklenmiş verinin aldığı isim aşağıdakilerden hangisidir?", a: ["Segment", "Paket", "Çerçeve (Frame)", "Bit"], c: 1 },
            { q: "Taşıma katmanında (Transport Layer) port ve kontrol bilgileri eklenmiş veriye ne ad verilir?", a: ["Paket", "Çerçeve", "Segment", "Bit"], c: 2 },
            { q: "Veri Bağlantısı katmanında MAC adresleri ve hata kontrol biti (FCS) eklenmiş veri yapısına ne ad verilir?", a: ["Segment", "Paket", "Çerçeve (Frame)", "Bit"], c: 3 },
            { q: "Verinin katmanlardan aşağıya inerken her aşamada başına bir başlık bilgisi eklenmesi sürecine ne ad verilir?", a: ["Kapsülleme (Encapsulation)", "Yönlendirme", "Çözümleme", "De-encapsulation"], c: 0 },
            { q: "Aşağıdakilerden hangisi bir siber hizmet engelleme (DoS) saldırısı türüdür?", a: ["FTP Pasif Mod", "SYN Flood", "DNS Önbellekleme", "DHCP Kiralama"], c: 1 },
            { q: "Yönlendiriciler (Router) OSI modelinin hangi katmanında faaliyet gösterir?", a: ["Katman 1 (Fiziksel)", "Katman 2 (Veri Bağlantısı)", "Katman 3 (Ağ)", "Katman 4 (Taşıma)"], c: 2 },
            { q: "Switch (Anahtarlayıcı) cihazları varsayılan olarak hangi OSI katmanında anahtarlama yapar?", a: ["Ağ Katmanı", "Veri Bağlantısı Katmanı", "Taşıma Katmanı", "Fiziksel Katman"], c: 1 },

            // 61-70: CMD Ağ Test Komutları (IPCONFIG - PING)
            { q: "Bilgisayardaki ağ kartlarının aktif IP yapılandırma ayarlarını gösteren temel komut hangisidir?", a: ["ping", "netstat", "ipconfig", "tracert"], c: 2 },
            { q: "Ağ kartının fiziksel MAC adresini, DHCP ve DNS sunucu detaylarını gösteren ipconfig parametresi hangisidir?", a: ["ipconfig /release", "ipconfig /renew", "ipconfig /all", "ipconfig /flushdns"], c: 2 },
            { q: "DHCP sunucusundan kiralanmış mevcut IP adresini tamamen serbest bırakıp silen komut hangisidir?", a: ["ipconfig /renew", "ipconfig /release", "ipconfig /flushdns", "ipconfig /displaydns"], c: 1 },
            { q: "DHCP sunucusundan yeni bir IP adresi kiralamak için hangi komut yürütülür?", a: ["ipconfig /release", "ipconfig /renew", "ipconfig /all", "ipconfig /flushdns"], c: 1 },
            { q: "Bilgisayarda biriken bozulmuş veya eskiyen DNS çözümleyici önbelleğini temizleyen komut hangisidir?", a: ["ipconfig /displaydns", "ipconfig /registerdns", "ipconfig /flushdns", "ipconfig /all"], c: 2 },
            { q: "Hedef cihazla temel erişilebilirliği test etmek amacıyla ICMP paketleri gönderen ağ aracı hangisidir?", a: ["tracert", "ping", "arp", "nbtstat"], c: 1 },
            { q: "Ping paketinin ağda sonsuz döngüye girmesini engellemek için her yönlendiricide 1 azaltılan yaşam süresi değeri nedir?", a: ["ACK", "TTL (Time to Live)", "Sequence", "Checksum"], c: 1 },
            { q: "Windows işletim sisteminde varsayılan başlangıç TTL değeri kaçtır?", a: ["32", "64", "128", "255"], c: 2 },
            { q: "Kullanıcı el ile durdurana (Ctrl+C) kadar kesintisiz ping atmayı sağlayan parametre hangisidir?", a: ["ping -n", "ping -t", "ping -l", "ping -a"], c: 1 },
            { q: "Ping atarken standart 32 baytlık paket boyutunu değiştirmek için hangi parametre kullanılır?", a: ["-t", "-a", "-n", "-l"], c: 3 },

            // 71-80: CMD Ağ Test Komutları (TRACERT - NBTSTAT)
            { q: "Ping atılan hedef IP adresinin ağ üzerindeki bilgisayar (host) adını çözmesini sağlayan parametre hangisidir?", a: ["-t", "-a", "-n", "-l"], c: 1 },
            { q: "Paketlerin hedefe ulaşana kadar hangi yönlendiricilerden (hop) geçtiğini adım adım listeleyen araç hangisidir?", a: ["ping", "netstat", "tracert", "arp"], c: 2 },
            { q: "Tracert işleminde IP adreslerini bilgisayar isimlerine dönüştürmesini engelleyerek taramayı hızlandıran parametre hangisidir?", a: ["-d", "-h", "-w", "-t"], c: 0 },
            { q: "Yol üzerindeki tüm yönlendiricilere yoğun paketler atarak düğüm bazlı paket kayıp oranını (%) hesaplayan gelişmiş araç hangisidir?", a: ["tracert", "ping", "pathping", "netstat"], c: 2 },
            { q: "TCP/IP üzerinden NetBIOS ad çözümleme istatistiklerini ve tablolarını gösteren araç hangisidir?", a: ["netstat", "nbtstat", "arp", "nslookup"], c: 1 },
            { q: "Yerel bilgisayara kaydedilmiş mevcut NetBIOS adlarını listeleyen nbtstat parametresi hangisidir?", a: ["-c", "-n", "-r", "-S"], c: 1 },
            { q: "Uzak bir bilgisayarın ismini vererek ona ait NetBIOS ad tablosunu çeken parametre hangisidir?", a: ["-a", "-A", "-c", "-n"], c: 0 },
            { q: "Uzak bir bilgisayarın IP adresini vererek ona ait NetBIOS ad tablosunu listeleyen parametre hangisidir?", a: ["-a", "-A", "-c", "-r"], c: 1 },
            { q: "NetBIOS ad tablosu sonucunda görünen <20> son eki cihazda hangi servisin aktif olduğunu gösterir?", a: ["İş İstasyonu", "Haberci Servisi", "Dosya/Yazıcı Paylaşımı (Hizmeti)", "Etki Alanı"], c: 2 },
            { q: "NetBIOS ad önbelleğini temizleyen ve Lmhosts dosyasından yeniden yükleyen parametre hangisidir?", a: ["-r", "-R", "-s", "-S"], c: 1 },

            // 81-90: CMD (NETSTAT - ARP) ve Yazıcılar
            { q: "Bilgisayardaki tüm aktif ağ bağlantılarını ve dinlenen (open) portları listeleyen komut hangisidir?", a: ["arp", "netstat", "nbtstat", "ipconfig"], c: 1 },
            { q: "Netstat komutunda adresleri ve port numaralarını isim yerine doğrudan sayısal (rakam) olarak gösteren parametre hangisidir?", a: ["-a", "-e", "-r", "-n"], c: 3 },
            { q: "Bilgisayarın aktif IPv4 ve IPv6 yönlendirme (yol) tablosunu listeleyen netstat parametresi hangisidir?", a: ["-e", "-r", "-s", "-p"], c: 1 },
            { q: "İletişim halindeki bir portun iki cihaz arasında bağlantısının tam kurulduğunu gösteren netstat durumu hangisidir?", a: ["LISTENING", "SYN_SENT", "ESTABLISHED", "CLOSE_WAIT"], c: 2 },
            { q: "IP adreslerini yerel ağda haberleşebilmek için fiziksel MAC adreslerine dönüştüren protokol ve komut hangisidir?", a: ["DNS", "ARP", "DHCP", "ICMP"], c: 1 },
            { q: "Bilgisayarda o an kayıtlı olan güncel ARP önbellek tablosunu görüntüleyen komut hangisidir?", a: ["arp -d", "arp -a", "arp -s", "arp -v"], c: 1 },
            { q: "ARP önbelleğindeki dinamik olarak öğrenilmiş tüm kayıtları temizleyen komut hangisidir?", a: ["arp -a", "arp -s", "arp -d", "arp -g"], c: 2 },
            { q: "Yazıcının bir bilgisayara USB ile bağlı olduğu ve o bilgisayar üzerinden ağa paylaştırıldığı mimari hangisidir?", a: ["Ağa direkt bağlı yazıcı", "Yerel bilgisayara bağlı paylaşılan yazıcı", "Yazdırma Sunucusu", "Bulut Yazıcı"], c: 1 },
            { q: "Yazıcının kendi ağ kartına (RJ-45 veya Wi-Fi) sahip olduğu ve bağımsız bir IP adresi alarak çalıştığı bağlantı türü hangisidir?", a: ["Yerel Paylaşılan Yazıcı", "Ağa direkt bağlı yazıcı", "Paralel Port Yazıcı", "Seri Bağlantı"], c: 1 },
            { q: "Ağ kartı olmayan yazıcıları ağa dahil eden ve yazdırma sıralarını (kuyruğunu) merkezi olarak yöneten donanım hangisidir?", a: ["Switch", "Router", "Yazdırma Sunucusu (Print Server)", "Hub"], c: 2 },

            // 91-100: Arıza Giderme Senaryoları
            { q: "Ağ yazıcısının özellikleri değiştirilemiyor veya yazdırma sırası yönetilemiyorsa ilk olarak ne kontrol edilmelidir?", a: ["Kablo bağlantısı", "Bilgisayar oturumunun Yönetici (Administrator) yetkisi", "Modem DSL ışığı", "Yazıcı toner seviyesi"], c: 1 },
            { q: "Modem üzerinde 'Power' ışığı hiç yanmıyorsa öncelikli olarak arıza nerede aranmalıdır?", a: ["Splitter cihazında", "Kullanıcı adı/şifre ayarlarında", "Adaptör kablosu, priz veya adaptör voltaj değerinde", "Telefon hattında"], c: 2 },
            { q: "Modem üzerinde DSL ışığının hiç yanmaması veya sürekli yanıp sönmesi neyin göstergesidir?", a: ["Bilgisayarda virüs olduğunun", "Servis sağlayıcı hattında sinyal kopukluğu veya splitter arızası olduğunun", "Ağ kartı sürücüsünün silindiğinin", "IP çakışması yaşandığının"], c: 1 },
            { q: "Evde/ofiste modeme gelen ana hatta paralel telefonların bağlı olması ağda nasıl bir soruna yol açar?", a: ["Modemin yanmasına", "Sinyal kalitesini düşürüp internetin sık sık kopmasına", "MAC adresi çakışmasına", "Portların kilitlenmesine"], c: 1 },
            { q: "Windows Aygıt Yöneticisinde ağ kartının yanında sarı ünlem (!) veya soru işareti (?) olması ne anlama gelir?", a: ["Kabloda temassızlık olduğu", "Sürücünün eksik/hatalı yüklendiği veya kartın devre dışı kaldığı", "IP adresi alınamadığı", "Çalışma grubu adı hatası"], c: 1 },
            { q: "Ağ kartının çalışma performansını artırmak için 'Speed & Duplex' ayarı ne yapılmalıdır?", a: ["10 Mbps Half Duplex", "100 Mbps Full Duplex", "Devre dışı", "Otomatik Algılama"], c: 1 },
            { q: "Yerel bir ağda (LAN) bilgisayarların sorunsuz dosya paylaşabilmesi için 'Bilgisayar Adı' ve 'Çalışma Grubu (Workgroup)' nasıl olmalıdır?", a: ["İsimler aynı, gruplar farklı", "İsimler benzersiz/farklı, gruplar kesinlikle aynı", "Hem isimler hem gruplar aynı", "Hem isimler hem gruplar farklı"], c: 1 },
            { q: "Yazıcı ekleme sihirbazında ağ yazıcısı otomatik listelenmiyorsa arızayı aşmak için ne yapılmalıdır?", a: ["Yazıcı çöpe atılmalı", "'İstediğim yazıcı listelenmiyor' denilerek elle IP adresi veya ağ yolu girilmeli", "Modem resetlenmeli", "Bilgisayar adı değiştirilmeli"], c: 1 },
            { q: "Fiziksel MAC adresinden IP adresi talep edilmesini sağlayan ancak günümüzde yerini DHCP'ye bırakmış protokol hangisidir?", a: ["ARP", "RARP", "ICMP", "DNS"], c: 1 },
            { q: "Bir ağ arabiriminin açık bağlantı isteklerini kabul etmeye hazır beklediğini belirten durum hangisidir?", a: ["ESTABLISHED", "CLOSE_WAIT", "LISTENING", "SYN_SENT"], c: 2 }
        ];

        // Soruları Ekrana Basma
        const container = document.getElementById('questions-container');
        questions.forEach((question, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `${index + 1}. ${question.q}`;
            card.appendChild(qText);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options-container';
            optionsDiv.id = `options-container-${index}`;

            question.a.forEach((option, oIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.id = `label-${index}-${oIndex}`;

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question-${index}`;
                radio.value = oIndex;

                // Tıklandığı zaman doğru cevabı gösterecek olay dinleyici
                radio.addEventListener('change', () => {
                    handleSelection(index, oIndex);
                });

                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${['A', 'B', 'C', 'D'][oIndex]}) ${option}`));
                optionsDiv.appendChild(label);
            });

            card.appendChild(optionsDiv);
            container.appendChild(card);
        });

        // Seçim yapıldığında anında doğru cevabı yeşil, yanlış ise seçileni kırmızı yapan fonksiyon
        function handleSelection(questionIndex, selectedOptionIndex) {
            const question = questions[questionIndex];
            const correctIndex = question.c;

            // Doğru şıkkı yeşil yap
            document.getElementById(`label-${questionIndex}-${correctIndex}`).classList.add('correct');

            if (selectedOptionIndex !== correctIndex) {
                // Yanlış işaretlenen şıkkı kırmızı yap
                document.getElementById(`label-${questionIndex}-${selectedOptionIndex}`).classList.add('wrong');
            }

            // Seçenekleri kilitleyerek daha fazla tıklamayı ve hover efektlerini engelle
            const optionsDiv = document.getElementById(`options-container-${questionIndex}`);
            if (optionsDiv) {
                optionsDiv.style.pointerEvents = 'none';
            }
        }

        // Cevapları Kontrol Etme Fonksiyonu
        function checkAnswers() {
            let score = 0;

            questions.forEach((question, index) => {
                const selectedRadio = document.querySelector(`input[name="question-${index}"]:checked`);
                const correctIndex = question.c;

                // Önceki renklendirmeleri temizle
                for (let i = 0; i < question.a.length; i++) {
                    document.getElementById(`label-${index}-${i}`).classList.remove('correct', 'wrong');
                }

                // Doğru şıkkı her halükarda yeşil yap
                document.getElementById(`label-${index}-${correctIndex}`).classList.add('correct');

                if (selectedRadio) {
                    const userAnswer = parseInt(selectedRadio.value);
                    if (userAnswer === correctIndex) {
                        score++;
                    } else {
                        // Yanlış işaretlenen şıkkı kırmızı yap
                        document.getElementById(`label-${index}-${userAnswer}`).classList.add('wrong');
                    }
                }

                // Sınav bitirildiğinde tüm soruların seçeneklerini kilitle
                const optionsDiv = document.getElementById(`options-container-${index}`);
                if (optionsDiv) {
                    optionsDiv.style.pointerEvents = 'none';
                }
            });

            // Sonuç Alanını Göster
            const resultArea = document.getElementById('result-area');
            const scoreText = document.getElementById('score-text');
            resultArea.style.display = 'block';
            scoreText.innerText = `Toplam Başarı: 100 Soru Üzerinden ${score} Doğru! (Başarı Oranı: %${score})`;

            // Sayfayı yukarı kaydır ki sonucu görsün
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
